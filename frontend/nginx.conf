server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Allow large video uploads / export downloads
    client_max_body_size 2G;

    # Proxy all /api/* calls to the backend container
    # Nginx strips the /api prefix before forwarding (trailing slash on proxy_pass)
    location /api/ {
        proxy_pass         http://backend:8642/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;

        # Long timeouts for FFmpeg exports
        proxy_read_timeout    600s;
        proxy_connect_timeout  75s;
        proxy_send_timeout    600s;
    }

    # React SPA — fall through to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
